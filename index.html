<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工资管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Helvetica Neue", sans-serif; }
        body { background-color: #f5f7fa; padding: 16px; }
        .container { max-width: 400px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h3 { font-size: 16px; margin-bottom: 12px; color: #333; }
        input { width: 100%; padding: 10px; margin: 6px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .row { display: flex; gap: 8px; }
        .row input { flex: 1; }
        button { width: 100%; padding: 12px; background: #007aff; color: white; border: none; border-radius: 8px; font-size: 14px; margin-top: 8px; cursor: pointer; }
        .btn-red { background: #ff3b30; }
        .btn-gray { background: #86868b; }
        .item { padding: 8px 0; border-bottom: 1px solid #eee; font-size: 13px; }
        .total { background: #e8f4ff; padding: 10px; border-radius: 8px; margin-top: 10px; font-weight: bold; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 999; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="loginOverlay">
        <div class="card" style="width: 90%; max-width: 300px;">
            <h3 style="text-align: center;">工资管理系统</h3>
            <input type="password" id="password" placeholder="请输入密码">
            <button onclick="checkLogin()">登录</button>
        </div>
    </div>

    <div class="container hidden" id="main">
        <!-- 1. 型号库 -->
        <div class="card">
            <h3>型号管理</h3>
            <div class="row">
                <input type="text" id="modelName" placeholder="型号">
                <input type="number" id="modelPrice" placeholder="单价" step="0.01">
            </div>
            <button onclick="saveModel()">保存型号</button>
            <div id="modelList" style="margin-top: 10px; max-height: 120px; overflow: auto;"></div>
        </div>

        <!-- 2. 每日录入 -->
        <div class="card">
            <h3>每日录入</h3>
            <input type="date" id="recordDate">
            <input type="text" id="userName" placeholder="姓名">
            <input type="text" id="recordModel" placeholder="型号" oninput="fillPrice()">
            <div class="row">
                <input type="number" id="recordPrice" placeholder="单价" readonly>
                <input type="number" id="recordQty" placeholder="数量">
            </div>
            <div class="row">
                <input type="number" id="hourlyPrice" placeholder="时薪">
                <input type="number" id="workHours" placeholder="工时">
            </div>
            <div class="row">
                <input type="number" id="workDays" placeholder="出勤天数">
                <input type="number" id="nightDays" placeholder="夜班天数">
            </div>
            <input type="number" id="overtime" placeholder="加班补贴">
            <input type="number" id="bonus" placeholder="绩效奖金">
            <button onclick="saveRecord()">保存记录</button>
        </div>

        <!-- 3. 今日统计 -->
        <div class="card">
            <h3>今日统计</h3>
            <div id="todaySummary"></div>
            <div class="total">合计：<span id="todayTotal">0.00</span> 元</div>
        </div>

        <!-- 4. 月度结算 -->
        <div class="card">
            <h3>月度结算（每月25号）</h3>
            <input type="month" id="filterMonth">
            <div class="row">
                <input type="number" id="monthBonus" placeholder="绩效">
                <input type="number" id="monthTax" placeholder="个税">
            </div>
            <div class="row">
                <input type="number" id="monthInsurance" placeholder="社保">
                <input type="number" id="monthOther" placeholder="其他扣款">
            </div>
            <button onclick="calcMonth()">计算工资</button>
            <div class="total">应发：<span id="monthGross">0.00</span> 元</div>
            <div class="total">实发：<span id="monthNet">0.00</span> 元</div>
        </div>

        <!-- 5. 记录列表 -->
        <div class="card">
            <h3>所有记录</h3>
            <div id="recordList" style="max-height: 150px; overflow: auto;"></div>
            <button class="btn-gray" onclick="clearAll()">清空所有记录</button>
        </div>
    </div>

    <script>
        // 基础配置
        const PASSWORD = "123456";
        const MEAL_ALLOWANCE = 16; // 餐补/天
        const NIGHT_ALLOWANCE = 20; // 夜班补贴/天

        // 数据存储
        let models = JSON.parse(localStorage.getItem("modelDB")) || [];
        let records = JSON.parse(localStorage.getItem("recordDB")) || [];

        // 工具函数
        const $ = id => document.getElementById(id);

        // 登录验证
        function checkLogin() {
            if ($("password").value === PASSWORD) {
                $("loginOverlay").classList.add("hidden");
                $("main").classList.remove("hidden");
                renderModels();
                renderRecords();
            } else {
                alert("密码错误");
            }
        }

        // 型号管理
        function saveModel() {
            const name = $("modelName").value.trim();
            const price = parseFloat($("modelPrice").value) || 0;
            if (!name || !price) return alert("请输入完整型号和单价");
            const idx = models.findIndex(m => m.name === name);
            idx >= 0 ? models[idx].price = price : models.push({ name, price });
            localStorage.setItem("modelDB", JSON.stringify(models));
            $("modelName").value = "";
            $("modelPrice").value = "";
            renderModels();
        }

        function renderModels() {
            $("modelList").innerHTML = models.map((m, i) => `
                <div class="item">${m.name} - ${m.price}元
                    <button class="btn-red" style="padding: 4px 8px; float: right;" onclick="delModel(${i})">删除</button>
                </div>`).join("");
        }

        function delModel(i) {
            if (confirm("确定删除？")) {
                models.splice(i, 1);
                localStorage.setItem("modelDB", JSON.stringify(models));
                renderModels();
            }
        }

        // 输入型号自动带出单价
        function fillPrice() {
            const name = $("recordModel").value.trim();
            const found = models.find(m => m.name === name);
            $("recordPrice").value = found ? found.price : "";
        }

        // 保存记录
        function saveRecord() {
            const date = $("recordDate").value;
            const userName = $("userName").value.trim();
            if (!date || !userName) return alert("请填写日期和姓名");

            const model = $("recordModel").value.trim();
            const price = parseFloat($("recordPrice").value) || 0;
            const qty = parseInt($("recordQty").value) || 0;
            const piece = price * qty;

            const hourRate = parseFloat($("hourlyPrice").value) || 0;
            const hours = parseFloat($("workHours").value) || 0;
            const hourly = hourRate * hours;

            const workDays = parseInt($("workDays").value) || 0;
            const nightDays = parseInt($("nightDays").value) || 0;
            const meal = workDays * MEAL_ALLOWANCE;
            const night = nightDays * NIGHT_ALLOWANCE;

            const overtime = parseFloat($("overtime").value) || 0;
            const bonus = parseFloat($("bonus").value) || 0;

            const total = piece + hourly + meal + night + overtime + bonus;

            records.unshift({
                date, userName, model, price, qty, piece, hourly, meal, night, overtime, bonus, total
            });
            localStorage.setItem("recordDB", JSON.stringify(records));

            // 清空表单
            $("recordModel").value = "";
            $("recordPrice").value = "";
            $("recordQty").value = "";
            $("hourlyPrice").value = "";
            $("workHours").value = "";
            $("workDays").value = "";
            $("nightDays").value = "";
            $("overtime").value = "";
            $("bonus").value = "";

            renderRecords();
            renderTodaySummary();
        }

        // 今日统计
        function renderTodaySummary() {
            const date = $("recordDate").value;
            if (!date) {
                $("todaySummary").innerHTML = "请选择日期";
                $("todayTotal").textContent = "0.00";
                return;
            }
            const todayRecords = records.filter(r => r.date === date);
            const total = todayRecords.reduce((sum, r) => sum + r.total, 0);
            $("todaySummary").innerHTML = todayRecords.map(r => `<div class="item">${r.model} - ${r.total.toFixed(2)}元</div>`).join("");
            $("todayTotal").textContent = total.toFixed(2);
        }

        // 记录列表
        function renderRecords() {
            $("recordList").innerHTML = records.map((r, i) => `
                <div class="item">${r.date} ${r.userName} - ${r.model} - ${r.total.toFixed(2)}元
                    <button class="btn-red" style="padding: 4px 8px; float: right;" onclick="delRecord(${i})">删除</button>
                </div>`).join("");
        }

        function delRecord(i) {
            if (confirm("确定删除？")) {
                records.splice(i, 1);
                localStorage.setItem("recordDB", JSON.stringify(records));
                renderRecords();
                renderTodaySummary();
            }
        }

        // 月度结算
        function calcMonth() {
            const month = $("filterMonth").value;
            if (!month) return alert("请选择月份");
            const monthRecords = records.filter(r => r.date.startsWith(month));
            const gross = monthRecords.reduce((sum, r) => sum + r.total, 0);
            const bonus = parseFloat($("monthBonus").value) || 0;
            const tax = parseFloat($("monthTax").value) || 0;
            const insurance = parseFloat($("monthInsurance").value) || 0;
            const other = parseFloat($("monthOther").value) || 0;
            const net = gross + bonus - tax - insurance - other;
            $("monthGross").textContent = gross.toFixed(2);
            $("monthNet").textContent = net.toFixed(2);
        }

        // 清空所有记录
        function clearAll() {
            if (confirm("确定清空所有记录？")) {
                records = [];
                localStorage.setItem("recordDB", JSON.stringify(records));
                renderRecords();
                renderTodaySummary();
            }
        }

        // 日期变化时更新今日统计
        $("recordDate").addEventListener("change", renderTodaySummary);
    </script>
</body>
</html>
